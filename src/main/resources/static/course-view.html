<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Center | CYVEXA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #0f172a; color: white;">
    <header style="background: #1e293b; border-bottom: 1px solid #334155; padding: 0 5%; height: 54px;">
        <a href="index.html" class="logo-container" style="flex-direction: row; align-items: center; gap: 0.75rem;">
            <img src="img/cyvexa-logo.png" alt="CYVEXA" style="height: 38px; width: auto; flex-shrink: 0; transform: scale(1.5);">
            <div style="display: flex; flex-direction: column;">
                <span class="logo-title" style="color: #60a5fa; font-size: 1.6rem;">CYVEXA</span>
                <span class="logo-subtitle" style="color: #94a3b8; font-size: 0.7rem; margin-top: 1px;">Professional Learning</span>
            </div>
        </a>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <a href="dashboard.html" class="btn btn-outline" style="color: white; border-color: #334155; background: #334155;">Back to Dashboard</a>
            <button onclick="logout()" class="btn btn-primary" style="background: #ef4444; border: none;">Sign Out</button>
        </div>
    </header>

    <main style="display: grid; grid-template-columns: 1fr 380px; height: calc(100vh - 54px);">
        <div style="padding: 3rem; overflow-y: auto; background: radial-gradient(circle at top left, #1e293b, #0f172a);">
            <div style="margin-bottom: 2rem;">
                <h1 id="courseTitle" style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; color: #f8fafc;">Course Intro</h1>
                <p id="activeLessonTitle" style="color: #60a5fa; font-size: 1.2rem; font-weight: 600; margin-top: 0.5rem;"></p>
            </div>

            <div class="video-container" style="border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
                <video id="mainVideo" controls controlsList="nodownload" style="width: 100%; aspect-ratio: 16/9; border-radius: 12px;">
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            
            <div style="margin-top: 2rem;">
                <p id="courseDesc" style="color: #94a3b8; font-size: 1.15rem; max-width: 900px; line-height: 1.7;"></p>
            </div>
        </div>

        <aside style="background: #1e293b; border-left: 1px solid #334155; padding: 2rem; overflow-y: auto;">
            <h3 style="margin-bottom: 2rem; font-size: 1.3rem; display: flex; align-items: center; gap: 0.75rem; color: #f8fafc;">
                <i class="fas fa-play-circle" style="color: #60a5fa;"></i> Course Curriculum
            </h3>
            <div id="lessonList" style="display: flex; flex-direction: column; gap: 0.75rem;">
                <!-- Lessons -->
            </div>
        </aside>
    </main>

    <script>
        (function() {
            var _token = localStorage.getItem('sessionToken');
            if (_token) {
                var _origFetch = window.fetch;
                window.fetch = function(url, opts) {
                    opts = opts || {};
                    opts.headers = opts.headers || {};
                    opts.headers['X-Session-Token'] = _token;
                    return _origFetch.call(this, url, opts).then(function(_r) {
                        if (_r.status === 401 && typeof url === 'string' && url.indexOf('/api/auth/') === -1) {
                            localStorage.removeItem('user');
                            localStorage.removeItem('sessionToken');
                            localStorage.setItem('redirectAfterLogin', window.location.href);
                            window.location.href = 'login.html';
                        }
                        return _r;
                    });
                };
            }
        })();

        function redirectToLogin() {
            localStorage.removeItem('user');
            localStorage.removeItem('sessionToken');
            localStorage.setItem('redirectAfterLogin', window.location.href);
            window.location.href = 'login.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');
        const user = JSON.parse(localStorage.getItem('user'));
        const sessionToken = localStorage.getItem('sessionToken');
        if (!user || !sessionToken) window.location.href = 'login.html';

        let currentCourse = null;
        let currentEnrollmentId = null;
        let currentLessonIndex = 0;
        let lessonProgressMap = {}; // lessonId -> percentage
        let lessonCompletedMap = {}; // lessonId -> completed boolean
        let reportedMilestones = new Set();
        let activeLessonId = null;

        async function getOrCreateEnrollment() {
            try {
                var checkRes = await fetch(`/api/enrollments/check?userId=${user.id}&courseId=${courseId}`, {
                    headers: { 'X-Session-Token': localStorage.getItem('sessionToken') }
                });
                if (checkRes.status === 401) { redirectToLogin(); return; }
                var isEnrolled = await checkRes.json();
                if (!isEnrolled) {
                    var enrollRes = await fetch(`/api/enrollments?userId=${user.id}&courseId=${courseId}`, {
                        method: 'POST',
                        headers: { 'X-Session-Token': localStorage.getItem('sessionToken') }
                    });
                    if (enrollRes.status === 401) { redirectToLogin(); return; }
                }
                var enrollmentsRes = await fetch(`/api/enrollments/user/${user.id}`, {
                    headers: { 'X-Session-Token': localStorage.getItem('sessionToken') }
                });
                if (enrollmentsRes.status === 401) { redirectToLogin(); return; }
                var list = await enrollmentsRes.json();
                var enr = list.find(function(e) { return e.course && e.course.id == courseId; });
                if (enr) currentEnrollmentId = enr.id;
            } catch (err) { console.error(err); }
        }

        async function loadCourseContent() {
            if (!courseId) return;
            try {
                const res = await fetch(`/api/courses/${courseId}`);
                currentCourse = await res.json();
                document.getElementById('courseTitle').innerText = currentCourse.title;
                document.getElementById('courseDesc').innerText = currentCourse.description;

                await getOrCreateEnrollment();

                const lessonList = document.getElementById('lessonList');
                lessonList.innerHTML = '';

                if (currentCourse.lessons && currentCourse.lessons.length > 0) {
                    // Load existing progress
                    if (currentEnrollmentId) {
                        try {
                            const progRes = await fetch(`/api/enrollments/${currentEnrollmentId}/progress`, {
                                headers: { 'X-Session-Token': localStorage.getItem('sessionToken') }
                            });
                            if (progRes.ok) {
                                const progData = await progRes.json();
                                if (progData.progress) {
                                    progData.progress.forEach(function(p) {
                                        lessonProgressMap[p.lesson.id] = p.progressPercent;
                                        lessonCompletedMap[p.lesson.id] = p.completed;
                                    });
                                }
                            }
                        } catch (e) { console.error(e); }
                    }

                    // Render lessons
                    renderLessonList();

                    // Play first lesson by default
                    const firstLesson = currentCourse.lessons[0];
                    const firstEl = lessonList.firstChild;
                    currentLessonIndex = 0;
                    playVideo(firstLesson.videoPath, firstEl, firstLesson.id, 0);
                }
            } catch (err) { console.error(err); }
        }

        function renderLessonList() {
            const lessonList = document.getElementById('lessonList');
            lessonList.innerHTML = '';

            let totalLessons = currentCourse.lessons.length;
            let totalProgressSum = 0;

            currentCourse.lessons.forEach(function(lesson, index) {
                var div = document.createElement('div');
                div.className = 'module-item';
                div.setAttribute('data-lesson-id', lesson.id);
                div.style.background = index === currentLessonIndex ? '#334155' : '#0f172a';
                div.style.color = 'white';
                div.style.border = '1px solid #334155';
                div.style.cursor = 'pointer';
                div.style.padding = '1.2rem';
                div.style.display = 'flex';
                div.style.alignItems = 'center';
                div.style.borderRadius = '8px';

                var isCompleted = lessonCompletedMap[lesson.id] || false;
                var progressPercent = lessonProgressMap[lesson.id] || 0;
                totalProgressSum += isCompleted ? 100 : progressPercent;

                var progressBadge = '';
                if (isCompleted) {
                    progressBadge = '<span style="color:#22c55e; font-size:0.75rem; font-weight:600;"><i class="fas fa-check"></i> Completed</span>';
                } else if (progressPercent > 0) {
                    progressBadge = `<span class="lesson-badge-${lesson.id}" style="color:#60a5fa; font-size:0.75rem; font-weight:600;"><i class="fas fa-spinner fa-spin"></i> ${progressPercent}% Watched</span>`;
                }

                div.innerHTML = `
                    <i class="fas ${isCompleted ? 'fa-check-circle' : 'fa-play'}" style="font-size: 0.8rem; color: ${isCompleted ? '#22c55e' : (index === currentLessonIndex ? '#60a5fa' : '#475569')}; margin-right: 1rem;"></i>
                    <span style="font-weight: 500; flex:1;">Module ${index + 1}: ${lesson.title}</span>
                    ${progressBadge}
                `;
                div.onclick = function() { playVideo(lesson.videoPath, div, lesson.id, index); };
                lessonList.appendChild(div);
            });

            // Update overall progress bar
            let overallProgress = totalLessons > 0 ? Math.round(totalProgressSum / totalLessons) : 0;
            updateProgressBar(overallProgress);
        }

        function playVideo(url, element, lessonId, index) {
            currentLessonIndex = index;
            activeLessonId = lessonId;
            reportedMilestones.clear();

            var activeLesson = currentCourse.lessons[index];
            document.getElementById('activeLessonTitle').innerText = `Playing: Module ${index + 1} - ${activeLesson.title}`;

            var video = document.getElementById('mainVideo');
            video.src = url;
            
            // Resume video from saved progress percent
            var savedPercent = lessonProgressMap[lessonId] || 0;
            video.onloadedmetadata = function() {
                if (savedPercent > 0 && savedPercent < 100) {
                    video.currentTime = (savedPercent / 100) * video.duration;
                }
            };

            video.play();

            // Render selected highlight
            document.querySelectorAll('.module-item').forEach(function(el, idx) {
                el.style.background = idx === index ? '#334155' : '#0f172a';
                var icon = el.querySelector('i');
                var idAttr = el.getAttribute('data-lesson-id');
                var isComp = lessonCompletedMap[idAttr] || false;
                if (icon && !isComp) {
                    icon.className = 'fas fa-play';
                    icon.style.color = idx === index ? '#60a5fa' : '#475569';
                }
            });

            // Setup tracking milestones
            video.onended = function() {
                markLessonComplete(lessonId, element, index);
            };
        }

        async function saveVideoProgress(lessonId, percent) {
            if (!currentEnrollmentId || !lessonId) return;
            try {
                var res = await fetch(`/api/enrollments/${currentEnrollmentId}/lessons/${lessonId}/progress?percent=${percent}`, {
                    method: 'POST',
                    headers: { 'X-Session-Token': localStorage.getItem('sessionToken') }
                });
                if (res.ok) {
                    var data = await res.json();
                    lessonProgressMap[lessonId] = data.progressPercent;
                    lessonCompletedMap[lessonId] = data.completed;
                    
                    // Re-render curriculum list to display updated percentages
                    renderLessonList();
                }
            } catch (err) { console.error(err); }
        }

        async function markLessonComplete(lessonId, element, index) {
            if (!currentEnrollmentId || !lessonId) return;
            try {
                var res = await fetch(`/api/enrollments/${currentEnrollmentId}/lessons/${lessonId}/complete`, {
                    method: 'POST',
                    headers: { 'X-Session-Token': localStorage.getItem('sessionToken'), 'Content-Type': 'application/json' }
                });
                if (res.ok) {
                    var data = await res.json();
                    lessonCompletedMap[lessonId] = true;
                    lessonProgressMap[lessonId] = 100;
                    
                    renderLessonList();

                    // Auto-play next lesson
                    if (currentCourse && currentCourse.lessons && index < currentCourse.lessons.length - 1) {
                        var nextIdx = index + 1;
                        var nextLesson = currentCourse.lessons[nextIdx];
                        var nextElements = document.querySelectorAll('.module-item');
                        if (nextElements[nextIdx]) {
                            setTimeout(function() {
                                playVideo(nextLesson.videoPath, nextElements[nextIdx], nextLesson.id, nextIdx);
                            }, 1500);
                        }
                    }
                }
            } catch (err) { console.error(err); }
        }

        function updateProgressBar(overallProgress) {
            var existing = document.getElementById('courseProgressBar');
            if (!existing) {
                var container = document.createElement('div');
                container.id = 'courseProgressBar';
                container.style.cssText = 'margin-bottom: 1.5rem; padding: 1rem; background: #0f172a; border-radius: 12px; border: 1px solid #334155;';
                container.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem; font-size:0.85rem;">
                        <span style="color:#94a3b8;">Course Progress</span>
                        <span id="progressText" style="color:#60a5fa; font-weight:600;">0%</span>
                    </div>
                    <div style="height:8px; background:#334155; border-radius:4px; overflow:hidden;">
                        <div id="progressFill" style="width:0%; height:100%; background:linear-gradient(90deg, #60a5fa, #3b82f6); border-radius:4px; transition:width 0.5s ease;"></div>
                    </div>
                `;
                var sidebar = document.querySelector('aside');
                if (sidebar) sidebar.insertBefore(container, sidebar.firstChild);
            }
            document.getElementById('progressFill').style.width = overallProgress + '%';
            document.getElementById('progressText').innerText = overallProgress + '%';
        }

        function logout() {
            var token = localStorage.getItem('sessionToken');
            if (token) {
                fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                }).catch(function(){});
            }
            localStorage.removeItem('user');
            localStorage.removeItem('sessionToken');
            window.location.href = 'index.html';
        }

        window.onload = function() {
            loadCourseContent();
            
            // Real-time video progress tracking
            var video = document.getElementById('mainVideo');
            video.addEventListener('timeupdate', function() {
                if (!video.duration || !activeLessonId) return;
                var isCompleted = lessonCompletedMap[activeLessonId] || false;
                if (isCompleted) return;

                var pct = (video.currentTime / video.duration) * 100;
                
                [25, 50, 75, 95].forEach(function(milestone) {
                    if (pct >= milestone && !reportedMilestones.has(milestone)) {
                        reportedMilestones.add(milestone);
                        // Save progress percentage (milestone 95 is treated as 95% complete)
                        saveVideoProgress(activeLessonId, milestone);
                    }
                });
            });
        };
    </script>
</body>
</html>
